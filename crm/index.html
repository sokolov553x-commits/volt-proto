<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOLT · CRM — Powerbank Station Network Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=13">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%235B8CFF'><path d='M13 2 4 14h6l-1 8 9-12h-6l1-8z'/></svg>">
</head>
<body>
<script>(function(){try{
 var stop=function(e){e.preventDefault();e.stopPropagation();return false;};
 document.addEventListener('keydown',function(e){
   if(e.keyCode===123)return stop(e);
   if((e.ctrlKey||e.metaKey)&&e.shiftKey&&[73,74,67].indexOf(e.keyCode)>-1)return stop(e);
   if((e.ctrlKey||e.metaKey)&&(e.keyCode===85||e.keyCode===83))return stop(e);
 },true);
 document.addEventListener('contextmenu',function(e){e.preventDefault();return false;},true);
 document.addEventListener('dragstart',function(e){e.preventDefault();},true);
 var s=document.documentElement.style;s.webkitUserSelect='none';s.userSelect='none';
 var allow=function(){var st=document.createElement('style');
   st.textContent='input,textarea,[contenteditable]{-webkit-user-select:text!important;user-select:text!important}';
   document.head&&document.head.appendChild(st);};
 if(document.head)allow();else document.addEventListener('DOMContentLoaded',allow);
}catch(_){}})();</script>
<div class="fx" aria-hidden="true"><div class="orb orb-a"></div><div class="orb orb-b"></div><div class="gridfx"></div></div>
<div id="app" class="shell">
  <header class="topnav">
    <span class="logo">
      <span class="logo-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z" fill="#fff"/></svg></span>
      <span class="logo-word">VOLT</span>
    </span>
    <nav id="nav" class="nav"></nav>
    <div class="topnav-right">
      <button class="cmdk-btn" id="cmdkBtn" title="Quick search">
        <svg class="ico-14" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg><kbd>⌘K</kbd>
      </button>
      <div class="lang-switch" id="langSwitch">
        <button class="lang-btn" id="langBtn" aria-haspopup="listbox" aria-expanded="false">
          <svg class="ico-14" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.6 2.5 14.4 0 18M12 3c-2.5 2.6-2.5 14.4 0 18"/></svg>
          <span id="langCurrent">EN</span>
        </button>
        <div class="lang-menu" id="langPicker" hidden role="listbox"></div>
      </div>
      <button class="live-btn" id="liveBtn" title="Live simulation">
        <svg class="ico-14" viewBox="0 0 24 24"><polygon points="6 3 20 12 6 21 6 3"/></svg><span>Live</span>
      </button>
      <button class="icon-btn" id="bellBtn" title="Alerts">
        <svg class="ico-18" viewBox="0 0 24 24"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        <span class="bell-count" id="bellCount">0</span>
      </button>
      <div class="role-switch" id="roleSwitch">
        <button class="role-btn" id="roleBtn" aria-haspopup="listbox" aria-expanded="false">
          <span class="avatar" id="userAvatar">AS</span>
          <span class="role-meta"><b id="userName">Aleksandr S.</b><span class="role-current" id="roleCurrent">Manager</span></span>
          <svg class="ico-14" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <div class="role-menu" id="roleMenu" role="listbox" hidden></div>
      </div>
    </div>
  </header>
  <div class="crumb" id="crumb" hidden></div>
  <main class="content" id="view" tabindex="-1"></main>
</div>

<!-- cmdk -->
<div class="cmdk-root" id="cmdkRoot" hidden>
  <div class="cmdk-back" data-cmdk-close></div>
  <div class="cmdk" role="dialog" aria-modal="true" aria-label="Quick search">
    <input id="cmdkInput" autocomplete="off" spellcheck="false">
    <div class="cmdk-list" id="cmdkList"></div>
  </div>
</div>
<!-- modal root -->
<div class="modal-root" id="modalRoot" hidden></div>
<!-- drawer root -->
<div class="drawer-root" id="drawerRoot" hidden></div>
<!-- toast root -->
<div class="toast-root" id="toastRoot"></div>

<script src="qrcode.js?v=13"></script>
<script src="data.js?v=13"></script>
<script src="app.js?v=13"></script>
</body>
</html>
